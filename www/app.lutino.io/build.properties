#  ============================================================================
#   Build property file for app.lutino.io
#  ============================================================================
default.encoding: UTF-8
default.uid:      ${user.name}
default.lang:     en
default.temp.dir: ${java.io.tmpdir}
default.url:      app.lutino.io

tidy.enabled
copyXMLSourceTree.enabled

dist.dir:               ${temp.dir}/${url}/dist
www.dir:                ${user.home}/var/deploy/app.lutino.io

user.css.dir:           ${user.dir}/src/css
user.img.dir:           ${user.dir}/img
user.xsl.dir:           ${user.dir}/src/xsl
user.xml.catalog:       ${user.dir}/cfg/catalog.xml
user.xml.dir:           ${user.dir}/src/xml/${lang}

silkpage.home.dir:                      ${user.dir}/../../core
silkpage.adapt.xsl.main:               ${user.xsl.dir}/config.xsl
silkpage.adapt.xsl.rdf:                ${user.xsl.dir}/rdf.xsl
silkpage.adapt.xsl.theme:              ala
silkpage.adapt.css.theme:              phenix
silkpage.website.database.document:    ${user.xml.dir}/website.database.xml
silkpage.acronyms.database.document:   ${silkpage.home.dir}/../templates/site/default/src/xml/en/glossary.xml

docbook.xsl.home:     ${user.home}/opt/docbook-xsl
docbook.website.home: ${user.home}/opt/docbook-website

ftp.server:
ftp.port:     21
ftp.remotedir:
ftp.userid:
ftp.password:
ftp.depends:  yes
ftp.passive:  yes
ftp.binary:   yes
ftp.localdir: ${dist.dir}

uid:      ${default.uid}
lang:     ${default.lang}
temp.dir: ${default.temp.dir}
url:      ${default.url}
