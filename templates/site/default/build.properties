#  ============================================================================
#   Build property file of the @site.id@ site, generated by SilkPage 
#   For online documentation, http://silkpage.markupware.com/docs/index.html
#  ============================================================================

#------------------------------------------------------------------------------
# Default properties
#------------------------------------------------------------------------------

#
# Encoding used in build.xml for compiliation.
#
default.encoding: UTF-8

#
# The user ID used to tag the build distribution file.
#
default.uid: ${user.name}

#
# The ISO language code used to locate the XML source files.
#
default.lang: en

#
# The temp. directory under which the build process is performed.
#
#default.temp.dir:D:/user/she/tmp
default.temp.dir: ${java.io.tmpdir}

#
# The URL for which the build is performed.
#
default.url: silkpage.@site.id@.site

#------------------------------------------------------------------------------
# Configurable attribute.(enabled|disabled)
#------------------------------------------------------------------------------

# <transformDocbook.enabled|disabled>
#  toggle the DocBook transformation.
#
transformDocbook.enabled

# <transformOlinks.enabled|disabled>
# Enables the Olinks transformation.
#
transformWebsiteTargets.enabled

# <tidy.enabled|disabled>
# toggle the Tidy verfication.
#
tidy.enabled

# <copyGraphics.enabled|disabled>
# toggle the usage of graphical elements in 'transformTabular.enabled' option.
#
copyGraphics.enabled

# <copyXmlSourceFiles.enabled|disabled>
# toggle the copy target for XML source files to be placed in HTML directories.
#
copyXmlSourceFiles.enabled

# <copyPdfFiles.enabled|disabled>
# toggle the copy target for PDF files to be placed in HTML directories.
#
copyPdfFiles.enabled

# <copyRDFFiles.enabled|disabled>
# toggle the copy target for RDF files to be placed in HTML directories.
#
copyRDFFiles.enabled

# <copyTexFiles.enabled|disabled>
# toggle the copy target for TeX source files to be placed in HTML directories.
#
copyTexFiles.enabled

# <copyRtfFiles.enabled|disabled>
# toggle the copy target for RTF files to be placed in HTML directories.
#
copyRtfFiles.enabled

# <copyCompressedFiles.enabled|disabled>
# toggle the copy target for compressed files to be placed in HTML directories.
#
copyCompressedFiles.enabled

# <copyEntFiles.enabled|disabled>
# toggle the copy target for Entity source files.
#
copyEntFiles.enabled

# <copyBuildFiles.enabled|disabled>
# toggle the copy target for build files.
#
copyBuildFiles.enabled
copyPHPFiles.enabled
copyRSSFiles.enabled

#------------------------------------------------------------------------------
# Set the properties related to the build tree
#------------------------------------------------------------------------------

build.dir:              ${temp.dir}/${url}/build
dist.dir:               ${temp.dir}/${url}/dist
deploy.dir:             ${temp.dir}/${url}/deploy
install.local.dir:      ${temp.dir}/${url}/install

#------------------------------------------------------------------------------
# User Directories
#------------------------------------------------------------------------------

user.graphics.dir:	${user.dir}/images
user.css.dir:		${user.dir}/src/css
src.xml.dir:		${user.dir}/src/xml/en

#------------------------------------------------------------------------------
# XSL Stylesheet, customization layers and related parameters
#------------------------------------------------------------------------------

silkpage.adapt.xsl.main: ${user.dir}/src/xsl/config.xsl
silkpage.adapt.xsl.theme: ala
silkpage.adapt.css.theme: ala

silkpage.website.database.document: ${src.xml.dir}/website.database.xml
silkpage.acronyms.database.document: http://silkpage.markupware.com/release/template/site/default/src/xml/en/glossary.xml

docbook.xsl.home: @silkpage.home.dir@/share/tools/docbook-xsl
docbook.website.home: @silkpage.home.dir@/share/tools/docbook-website
#------------------------------------------------------------------------------
# FTP parameters to upload the site
#------------------------------------------------------------------------------
ftp.server: 
ftp.port: 21
ftp.remotedir: 
ftp.userid:
ftp.password:
ftp.depends: yes
ftp.passive: yes
ftp.binary: yes
ftp.localdir: ${install.local.dir}

# --------------------------------< N O T E >-----------------------------------
# don't change below
uid: ${default.uid}
lang: ${default.lang}
temp.dir: ${default.temp.dir}
url: ${default.url}
