# ── lutino.io — Apache virtual host (local dev) ───────────────────────────────
#
# Install:
#   sudo cp dev/infra/vhosts/lutino.io.conf /etc/apache2/other/
#   sudo apachectl graceful
#
# The SSL cert + key paths below are written by dev/infra/ssl/cacert-setup.sh
# using the cert retrieved from 1Password.  The canonical path is stored in
# ~/.config/lutino/ssl/.cacert_path  (the "dotfile path").
#
# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName  lutino.io
    ServerAlias www.lutino.io

    RewriteEngine On
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

# ── HTTPS ──────────────────────────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName  lutino.io
    ServerAlias www.lutino.io

    DocumentRoot "${HOME}/var/deploy/lutino.io"

    <Directory "${HOME}/var/deploy/lutino.io">
        Options    Indexes FollowSymLinks
        AllowOverride None
        Require    all granted
    </Directory>

    # ── TLS ───────────────────────────────────────────────────────────────────
    SSLEngine on

    # Cert and key are managed by dev/infra/ssl/cacert-setup.sh.
    # The paths below mirror what cacert-setup.sh writes to ~/.config/lutino/ssl/
    SSLCertificateFile    "${HOME}/.config/lutino/ssl/lutino.io.crt"
    SSLCertificateKeyFile "${HOME}/.config/lutino/ssl/lutino.io.key"

    # Local CA cert (retrieved from 1Password and written by cacert-setup.sh)
    SSLCACertificateFile  "${HOME}/.config/lutino/ssl/cacert.pem"

    SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite        HIGH:!aNULL:!MD5:!3DES
    SSLHonorCipherOrder   on

    # ── Logging ───────────────────────────────────────────────────────────────
    ErrorLog  "${HOME}/var/log/lutino.io-error.log"
    CustomLog "${HOME}/var/log/lutino.io-access.log" combined

    # ── Headers ───────────────────────────────────────────────────────────────
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
</VirtualHost>
