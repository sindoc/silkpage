# ── app.lutino.io — Apache virtual host (local dev) ──────────────────────────
#
# Install:
#   sudo cp dev/infra/vhosts/app.lutino.io.conf /etc/apache2/other/
#   sudo apachectl graceful
#
# TLS cert managed by dev/infra/ssl/cacert-setup.sh (1Password + file lock).
# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName  app.lutino.io

    RewriteEngine On
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

# ── HTTPS ──────────────────────────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName app.lutino.io

    DocumentRoot "${HOME}/var/deploy/app.lutino.io"

    <Directory "${HOME}/var/deploy/app.lutino.io">
        Options    Indexes FollowSymLinks
        AllowOverride None
        Require    all granted
    </Directory>

    # ── TLS (cert managed via 1Password / cacert-setup.sh) ────────────────────
    SSLEngine on
    SSLCertificateFile    "${HOME}/.config/lutino/ssl/app.lutino.io.crt"
    SSLCertificateKeyFile "${HOME}/.config/lutino/ssl/app.lutino.io.key"
    SSLCACertificateFile  "${HOME}/.config/lutino/ssl/cacert.pem"

    SSLProtocol         all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite      HIGH:!aNULL:!MD5:!3DES
    SSLHonorCipherOrder on

    # ── CDN asset cross-origin ────────────────────────────────────────────────
    Header always set Access-Control-Allow-Origin "https://cdn.lutino.io"

    # ── Logging ───────────────────────────────────────────────────────────────
    ErrorLog  "${HOME}/var/log/app.lutino.io-error.log"
    CustomLog "${HOME}/var/log/app.lutino.io-access.log" combined

    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
</VirtualHost>
