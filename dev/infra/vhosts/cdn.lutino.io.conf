# ── cdn.lutino.io — Apache virtual host (local dev, static CDN) ──────────────
#
# Install:
#   sudo cp dev/infra/vhosts/cdn.lutino.io.conf /etc/apache2/other/
#   sudo apachectl graceful
#
# TLS cert managed by dev/infra/ssl/cacert-setup.sh (1Password + file lock).
# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName cdn.lutino.io

    RewriteEngine On
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

# ── HTTPS ──────────────────────────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName cdn.lutino.io

    DocumentRoot "${HOME}/var/deploy/cdn.lutino.io"

    <Directory "${HOME}/var/deploy/cdn.lutino.io">
        Options    Indexes FollowSymLinks
        AllowOverride None
        Require    all granted
    </Directory>

    # ── TLS (cert managed via 1Password / cacert-setup.sh) ────────────────────
    SSLEngine on
    SSLCertificateFile    "${HOME}/.config/lutino/ssl/cdn.lutino.io.crt"
    SSLCertificateKeyFile "${HOME}/.config/lutino/ssl/cdn.lutino.io.key"
    SSLCACertificateFile  "${HOME}/.config/lutino/ssl/cacert.pem"

    SSLProtocol         all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite      HIGH:!aNULL:!MD5:!3DES
    SSLHonorCipherOrder on

    # ── CDN-specific headers ───────────────────────────────────────────────────
    # Wide CORS — CDN serves assets to multiple origins
    Header always set Access-Control-Allow-Origin "*"
    Header always set Cache-Control "public, max-age=86400, immutable"
    Header always set Vary "Accept-Encoding"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Strict-Transport-Security "max-age=63072000"

    # ── Compression ───────────────────────────────────────────────────────────
    AddOutputFilterByType DEFLATE text/css application/javascript \
                                  image/svg+xml text/plain text/xml

    # ── Logging ───────────────────────────────────────────────────────────────
    ErrorLog  "${HOME}/var/log/cdn.lutino.io-error.log"
    CustomLog "${HOME}/var/log/cdn.lutino.io-access.log" combined
</VirtualHost>
