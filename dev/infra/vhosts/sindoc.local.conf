# ── sindoc.local — Apache virtual host (local dev) ──────────────────────────────
#
# Install:
#   sudo cp dev/infra/vhosts/sindoc.local.conf /etc/apache2/other/
#   sudo apachectl graceful
#
# The SSL cert + key paths below are expected under /Users/skh/.config/lutino/ssl
#
<VirtualHost *:80>
    ServerName sindoc.local

    RewriteEngine On
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<VirtualHost *:443>
    ServerName sindoc.local

    DocumentRoot "/Users/skh/var/deploy/sindoc.local"

    <Directory "/Users/skh/var/deploy/sindoc.local">
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    SSLEngine on
    SSLCertificateFile "/Users/skh/.config/lutino/ssl/sindoc.local.crt"
    SSLCertificateKeyFile "/Users/skh/.config/lutino/ssl/sindoc.local.key"
    SSLCACertificateFile "/Users/skh/.config/lutino/ssl/cacert.pem"

    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite HIGH:!aNULL:!MD5:!3DES
    SSLHonorCipherOrder on

    ErrorLog "/Users/skh/var/log/sindoc.local-error.log"
    CustomLog "/Users/skh/var/log/sindoc.local-access.log" combined

    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
</VirtualHost>
